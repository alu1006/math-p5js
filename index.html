<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>彈幕拼圖工坊</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 流場背景（全程固定在最底層） -->
<div id="bg-canvas"></div>

<!-- Loading 畫面 -->
<div id="loading">
  <div id="loading-inner">
    <div id="loading-title">彈幕拼圖工坊</div>
    <div id="loading-sub">互動式數學彈道實驗室</div>
    <div id="loading-formula">
      <span class="lf">x(t) = v·t</span>
      <span class="lf">y(t) = A·sin(ωt)</span>
      <span class="lf">R(θ)·v⃗</span>
    </div>
    <button id="loading-enter">點擊進入 →</button>
    <div id="loading-hint">組合數學公式，設計你的彈幕</div>
  </div>
</div>

<!-- 主功能（載入後淡入） -->
<div id="app">
<div id="top">
  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
    <div id="stats" style="position:absolute;top:8px;right:12px;font-size:10px;color:#aaa;text-align:right;pointer-events:none;line-height:1.8;background:rgba(255,255,255,0.8);padding:4px 8px;border-radius:4px;border:1px solid #eee;">
      子彈 <span id="s-bullets">0</span><br>
      已發射 <span id="s-fired">0</span><br>
      FPS <span id="s-fps">0</span>
    </div>
  </div>

  <div id="side">
    <div id="side-tabs">
      <div class="side-tab active" data-tab="math">📐 數學式</div>
      <div class="side-tab" data-tab="code">💻 p5.js 程式碼</div>
    </div>
    <div id="side-content">

      <!-- 數學式 -->
      <div id="math-panel" class="side-panel active">
        <div class="no-combo" id="math-empty">
          先在下方拼裝方塊<br>這裡會顯示對應的<br>數學參數方程式 📐
        </div>
        <div id="math-content" style="display:none"></div>
      </div>

      <!-- p5.js 程式碼 -->
      <div id="code-panel-wrap" class="side-panel" style="padding:0;flex-direction:column;height:100%;">
        <div id="code-toolbar">
          <button class="code-btn primary" id="btn-copy">📋 複製程式碼</button>
          <button class="code-btn" id="btn-p5-open">🔗 開啟 p5js.org</button>
        </div>
        <div id="code-output">
          <div class="no-code">先在下方拼裝方塊<br>這裡會生成可直接執行的<br>p5.js 動畫程式碼 💻</div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="bottom">
  <div id="assembly-row">
    <div class="asm-label">COMBO</div>
    <div class="block-slot slot-0 empty" data-slot="0"><div class="slot-inner"><div class="slot-cat">EMITTER</div><div class="slot-icon">🎯</div><div class="slot-name">發射器</div></div><div class="slot-remove">✕</div></div>
    <div class="block-slot slot-1 empty" data-slot="1"><div class="slot-inner"><div class="slot-cat">PATH</div><div class="slot-icon">📐</div><div class="slot-name">軌跡</div></div><div class="slot-remove">✕</div></div>
    <div class="block-slot slot-2 empty" data-slot="2"><div class="slot-inner"><div class="slot-cat">MODIFIER</div><div class="slot-icon">🌊</div><div class="slot-name">修飾</div></div><div class="slot-remove">✕</div></div>
    <div class="block-slot slot-3 empty" data-slot="3"><div class="slot-inner"><div class="slot-cat">EFFECT</div><div class="slot-icon">⚡</div><div class="slot-name">特效</div></div><div class="slot-remove">✕</div></div>
    <div id="fire-zone">
      <button id="btn-fire"><span class="fi">▶</span>FIRE</button>
      <button id="btn-reset">清 除</button>
    </div>
  </div>
  <div id="preset-row">
    <span>PRESET：</span>
    <button class="preset-btn" data-preset="dragon">🐉 龍之呼吸</button>
    <button class="preset-btn" data-preset="sakura">🌸 花瓣雨</button>
    <button class="preset-btn" data-preset="lightning">⚡ 閃電扇</button>
    <button class="preset-btn" data-preset="galaxy">🌀 銀河漩渦</button>
    <button class="preset-btn" data-preset="chaos">💥 混沌爆發</button>
    <button class="preset-btn" data-preset="rain">🌧 彈幕暴雨</button>
  </div>
  <div id="palette-area">
    <div id="cat-tabs">
      <div class="cat-tab active" data-cat="emitter">🎯 EMITTER</div>
      <div class="cat-tab" data-cat="path">📐 PATH</div>
      <div class="cat-tab" data-cat="mod">🌊 MODIFIER</div>
      <div class="cat-tab" data-cat="effect">⚡ EFFECT</div>
    </div>
    <div id="block-palette"></div>
  </div>
</div>

<div id="ghost"></div>
</div><!-- /#app -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
<script src="bg.js"></script>
<script src="main.js"></script>
</body>
</html>
